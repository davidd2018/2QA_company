<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Người đăng ký dịch vụ</title>
</head>

<body>
<div layout:fragment="content" class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 style="font-weight:700; color:#1e293b; margin:0;">
                <i class="bi bi-people-fill me-2" style="color:#6366f1;"></i>Người đăng ký
            </h2>
            <p class="text-muted mb-0 mt-1">Dịch vụ: <strong th:text="${service.name}"></strong></p>
        </div>
        <a th:href="@{/quan-ly-dich-vu}" class="btn btn-outline-secondary" style="border-radius:10px;">
            <i class="bi bi-arrow-left me-1"></i>Quay lại
        </a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#f0fdf4;">
        <i class="bi bi-check-circle-fill me-2 fs-5"></i>
        <span th:text="${successMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${errorMsg}" class="alert alert-danger border-0 shadow-sm d-flex align-items-center mb-4" role="alert" style="border-radius:12px; background:#fef2f2;">
        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i>
        <span th:text="${errorMsg}"></span>
        <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table custom-table table-hover mb-0">
                <thead>
                <tr>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">STT</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">TÊN ĐĂNG NHẬP</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">NGÀY ĐĂNG KÝ</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">SỐ TIỀN</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem;">TRẠNG THÁI</th>
                    <th style="padding:14px 16px; font-weight:600; color:#64748b; font-size:0.85rem; text-align:center;">THAO TÁC</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="sub, iterStat : ${subscriptions}">
                    <td class="text-center text-muted fw-bold" th:text="${iterStat.count}">1</td>

                    <td>
                        <div class="d-flex align-items-center">
                            <div class="user-avatar me-3"
                                 th:text="${sub.user.login_name != null ? #strings.substring(sub.user.login_name,0,1).toUpperCase() : 'U'}">U</div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${sub.user.login_name}">Login Name</div>
                                <small class="text-muted">Cư dân hệ thống</small>
                            </div>
                        </div>
                    </td>

                    <td>
                        <div class="text-dark fw-medium">
                            <i class="bi bi-calendar3 me-1 small"></i>
                            <span th:text="${#temporals.format(sub.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                        <small class="text-muted" th:text="${#temporals.format(sub.createdAt, 'HH:mm')}"></small>
                    </td>
                    <td style="padding:12px 16px;">
                        <span th:if="${paymentMap.containsKey(sub.id) and paymentMap.get(sub.id).status == 'DA_THANH_TOAN'}"
                              class="badge" style="background:#dcfce7; color:#16a34a; padding:6px 14px; border-radius:20px; font-weight:600;">
                            <i class="bi bi-check-circle-fill me-1"></i>Đã thanh toán
                        </span>
                        <span th:if="${paymentMap.containsKey(sub.id) and paymentMap.get(sub.id).status == 'CHUA_THANH_TOAN'}"
                              class="badge" style="background:#fee2e2; color:#dc2626; padding:6px 14px; border-radius:20px; font-weight:600;">
                            <i class="bi bi-x-circle-fill me-1"></i>Chưa thanh toán
                        </span>
                    </td>

                    <td class="text-center">
                        <form th:if="${paymentMap.containsKey(sub.id)}"
                              th:action="@{/quan-ly-dich-vu/toggle-payment/{paymentId}(paymentId=${paymentMap.get(sub.id).id})}"
                              method="post" class="d-inline">
                            <input type="hidden" name="serviceId" th:value="${service.id}"/>
                            <button type="submit" class="btn btn-sm btn-outline-warning" style="border-radius:8px; padding:6px 14px;"
                                    title="Đổi trạng thái thanh toán">
                                <i class="bi bi-arrow-repeat"></i> Đổi TT
                            </button>
                        </form>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(subscriptions)}">
                    <td colspan="6" class="text-center py-5" style="color:#94a3b8;">
                        <i class="bi bi-person-x" style="font-size:2rem;"></i>
                        <p class="mt-2 mb-0">Chưa có ai đăng ký dịch vụ này</p>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
