<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
    <title>Thêm loại chung cư</title>
    <link rel="stylesheet" th:href="@{/css/category-add.css}">
</head>

<body>
<div layout:fragment="content" class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="form-card">
                <h2 class="form-title">
                    <i class="bi bi-tag-fill"></i> Thêm loại chung cư
                </h2>

                <p class="text-muted mb-4" style="font-size: 0.9rem;">
                    Nhập tên loại hình chung cư mới để phân loại các dự án trong hệ thống.
                </p>

                <form th:action="@{/categories/save}" method="post">

                    <div class="mb-4">
                        <label for="name" class="form-label">Tên loại chung cư</label>
                        <input class="form-control custom-input"
                               type="text"
                               id="name"
                               name="name"
                               placeholder="VD: Chung cư cao cấp, Studio, Penthouse..."
                               required>
                        <div class="form-text mt-2" style="font-size: 0.8rem;">
                            * Tên loại không nên quá 50 ký tự.
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-5">
                        <a th:href="@{/categories}" class="btn-modern btn-cancel">
                            <i class="bi bi-x-lg"></i> Hủy bỏ
                        </a>
                        <button type="submit" class="btn-modern btn-save shadow-sm">
                            <i class="bi bi-check-lg"></i> Lưu dữ liệu
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>
</body>
</html>
