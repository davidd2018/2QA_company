<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{_layout}">
<head>
    <meta charset="UTF-8">
</head>
<body>
<div layout:fragment="content" class="container body-content">
    <h2 class="mt-3 mb-3">&#10010; Thêm thông báo mới</h2>

    <form th:action="@{/thongbao/save}" method="post" th:object="${thongbao}">

        <div class="mb-3">
            <label for="loaiThongBao" class="form-label fw-bold">Loại thông báo</label>
            <select class="form-select" id="loaiThongBao" th:field="*{loaiThongBao}" required
                    onchange="toggleScheduleFields()">                <option value="THONG_BAO_CHUNG">&#128226; Thông báo chung</option>
                <option value="LICH_CAT_DIEN_NUOC">&#9889; Lịch cắt điện nước</option>
                <option value="LICH_BAO_TRI">&#128736; Lịch bảo trì</option>
                <option value="NOI_QUY">&#128220; Nội quy</option>
                <option value="TIN_KHAN_CAP">&#128680; Tin khẩn cấp</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="tieuDe" class="form-label fw-bold">Tiêu đề</label>
            <input type="text" class="form-control" id="tieuDe" th:field="*{tieuDe}"
                   placeholder="Nhập tiêu đề thông báo" required>
        </div>

        <div class="mb-3">
            <label for="noiDung" class="form-label fw-bold">Nội dung</label>
            <textarea class="form-control" id="noiDung" th:field="*{noiDung}" rows="6"
                      placeholder="Nhập nội dung chi tiết..." required></textarea>
        </div>

        <!-- === CAC TRUONG CHO LICH BAO TRI / CAT DIEN NUOC === -->
        <div id="scheduleFields" style="display:none; background:#fffbeb; border:1px solid #fde68a; border-radius:10px; padding:20px; margin-bottom:16px;">
            <h6 class="fw-bold mb-3" style="color:#92400e;"><i class="bi bi-calendar-event me-2"></i>Thông tin lịch trình</h6>

            <div class="row g-3">
                <div class="col-md-4">
                    <label for="schedDate" class="form-label fw-bold">Ngày</label>
                    <input type="date" class="form-control" id="schedDate" name="schedDate">
                </div>
                <div class="col-md-2">
                    <label for="schedHour" class="form-label fw-bold">Giờ</label>
                    <input type="number" class="form-control" id="schedHour" name="schedHour" min="0" max="23" placeholder="HH">
                </div>
                <div class="col-md-2">
                    <label for="schedMinute" class="form-label fw-bold">Phút</label>
                    <input type="number" class="form-control" id="schedMinute" name="schedMinute" min="0" max="59" placeholder="MM">
                </div>
                <div class="col-md-4">
                    <label for="khuChungCu" class="form-label fw-bold">Khu chung cư</label>
                    <select class="form-select" id="khuChungCu" th:field="*{khuChungCu}">
                        <option value="">-- Toàn bộ chung cư --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.name}" th:text="${cat.name}"></option>
                    </select>
                </div>
            </div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="ghim" th:field="*{ghim}">
            <label class="form-check-label" for="ghim">&#128204; Ghim thông báo lên đầu</label>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Lưu thông báo</button>
            <a th:href="@{/thongbao}" class="btn btn-outline-secondary">Hủy</a>
        </div>
    </form>

    <script th:src="@{/js/thongbao-form.js}" defer></script>
</div>
</body>
</html>
